<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵感日记 - UI 风格示例</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAFAF8;
            --bg-card: rgba(255, 255, 255, 0.8);
            --accent-primary: #E8B4B8;
            --accent-secondary: #A8D5BA;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-frame {
            max-width: 430px;
            margin: 0 auto;
            background: linear-gradient(180deg, #FAFAF8 0%, #F5F0F6 100%);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
        }

        .header {
            padding: 24px 20px 16px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            padding: 14px 12px;
            box-shadow: var(--shadow-soft);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .inspiration-list {
            padding: 0 20px 100px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 8px 0 12px;
        }

        .inspiration-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            animation: cardEnter 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .inspiration-card:nth-child(1) { animation-delay: 0.1s; }
        .inspiration-card:nth-child(2) { animation-delay: 0.2s; }
        .inspiration-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .inspiration-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .inspiration-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .inspiration-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            flex: 1;
        }

        .tag-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 500;
        }

        .tag-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #F8D7DA 100%);
            color: #7A4A4E;
        }

        .tag-secondary {
            background: linear-gradient(135deg, var(--accent-secondary) 0%, #D4EDDA 100%);
            color: #3D6B4F;
        }

        .inspiration-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .inspiration-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inspiration-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .inspiration-emotion {
            font-size: 12px;
            padding: 4px 8px;
            background: rgba(232, 180, 184, 0.15);
            border-radius: 6px;
            color: var(--accent-primary);
            font-weight: 500;
        }

        .floating-btn {
            position: fixed;
            bottom: 24px;
            right: calc(50% - 215px);
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(232, 180, 184, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
        }

        @media (max-width: 430px) {
            .floating-btn {
                right: 24px;
            }
        }

        .floating-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .floating-btn:active {
            transform: scale(0.95);
        }

        .floating-btn svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .pulse-ring {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            opacity: 0.4;
            animation: pulse 2s cubic-bezier(0.23, 1, 0.32, 1) infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.2);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 24px;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 16px;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(232, 180, 184, 0.1);
        }

        .nav-item.active {
            background: rgba(232, 180, 184, 0.15);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
        }

        .nav-item.active .nav-icon {
            color: var(--accent-primary);
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item.active .nav-label {
            color: var(--accent-primary);
        }

        .demo-note {
            text-align: center;
            padding: 20px;
            background: rgba(168, 213, 186, 0.15);
            margin: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--accent-secondary);
        }

        .demo-note-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .demo-note-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <header class="header">
            <h1 class="header-title">灵感日记</h1>
            <p class="header-subtitle">记录每一个闪光的想法</p>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number">24</div>
                <div class="stat-label">灵感</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">12</div>
                <div class="stat-label">待办</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">58%</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>

        <div class="inspiration-list">
            <div class="demo-note">
                <div class="demo-note-title">🎨 UI 风格示例</div>
                <div class="demo-note-text">
                    暖米白渐变背景 • 毛玻璃质感卡片 • 柔和珊瑚粉与薄荷绿配色<br>
                    流畅的入场动画 • 浮动创作按钮 • 简洁底部导航
                </div>
            </div>

            <h2 class="section-title">最近灵感</h2>

            <div class="inspiration-card">
                <div class="inspiration-header">
                    <h3 class="inspiration-title">创意写作应用想法</h3>
                </div>
                <div class="tag-list">
                    <span class="tag tag-primary">创意</span>
                    <span class="tag tag-secondary">产品</span>
                </div>
                <p class="inspiration-content">
                    今天在地铁上突然想到一个写作应用的点子，应该会很有意思...
                </p>
                <div class="inspiration-footer">
                    <span class="inspiration-time">10:23</span>
                    <span class="inspiration-emotion">✨ 兴奋</span>
                </div>
            </div>

            <div class="inspiration-card">
                <div class="inspiration-header">
                    <h3 class="inspiration-title">周末徒步计划</h3>
                </div>
                <div class="tag-list">
                    <span class="tag tag-secondary">生活</span>
                </div>
                <p class="inspiration-content">
                    想去郊外走走，放松一下心情，顺便看看风景...
                </p>
                <div class="inspiration-footer">
                    <span class="inspiration-time">昨天</span>
                    <span class="inspiration-emotion">🌿 平静</span>
                </div>
            </div>

            <div class="inspiration-card">
                <div class="inspiration-header">
                    <h3 class="inspiration-title">学习 Rust 编程语言</h3>
                </div>
                <div class="tag-list">
                    <span class="tag tag-primary">技术</span>
                    <span class="tag tag-secondary">学习</span>
                </div>
                <p class="inspiration-content">
                    最近对系统编程比较感兴趣，Rust 看起来是个不错的选择...
                </p>
                <div class="inspiration-footer">
                    <span class="inspiration-time">2天前</span>
                    <span class="inspiration-emotion">🤔 期待</span>
                </div>
            </div>
        </div>

        <div class="floating-btn" onclick="alert('点击创建新灵感！')">
            <div class="pulse-ring"></div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
                <span class="nav-label">灵感</span>
            </div>
            <div class="nav-item">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                <span class="nav-label">待办</span>
            </div>
            <div class="nav-item">
                <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                <span class="nav-label">统计</span>
            </div>
        </nav>
    </div>

    <script>
        const floatingBtn = document.querySelector('.floating-btn');
        
        floatingBtn.addEventListener('mouseenter', () => {
            floatingBtn.style.transform = 'scale(1.1) rotate(15deg)';
        });
        
        floatingBtn.addEventListener('mouseleave', () => {
            floatingBtn.style.transform = 'scale(1) rotate(0deg)';
        });

        const cards = document.querySelectorAll('.inspiration-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                card.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 150);
            });
        });

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
