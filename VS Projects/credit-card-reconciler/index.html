<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 信用卡对账系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="app-title">💳 信用卡对账</h1>
            </div>

            <div class="header-center">
                <select id="month-selector" class="month-selector">
                    <!-- 月份选项将动态生成 -->
                </select>
            </div>

            <div class="header-right">
                <button id="import-btn" class="btn-secondary">
                    📥 导入
                </button>
                <button id="export-btn" class="btn-secondary">
                    📤 导出
                </button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
                <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar" id="sidebar">
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">仪表板</span>
                </button>
                <button class="nav-item" data-view="transactions">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">交易管理</span>
                </button>
                <button class="nav-item" data-view="analytics">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">数据分析</span>
                </button>
                <button class="nav-item" data-view="import">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">账单导入</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="storage-info">
                    <div class="storage-label">存储使用</div>
                    <div class="storage-bar">
                        <div class="storage-fill" id="storage-fill"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 仪表板视图 -->
            <div id="dashboard-view" class="view">
                <!-- 仪表板内容由 DashboardView 渲染 -->
            </div>

            <!-- 交易管理视图 -->
            <div id="transactions-view" class="view hidden">
                <!-- 交易列表由 TransactionListView 渲染 -->
            </div>

            <!-- 数据分析视图 -->
            <div id="analytics-view" class="view hidden">
                <!-- 图表由 ChartView 渲染 -->
            </div>

            <!-- 账单导入视图 -->
            <div id="import-view" class="view hidden">
                <div class="import-container">
                    <h2 class="import-title">导入账单</h2>

                    <div class="import-methods">
                        <div class="import-method">
                            <h3 class="method-title">粘贴邮件文本</h3>
                            <textarea id="paste-area" class="paste-area"
                                placeholder="在此粘贴信用卡账单邮件内容..."></textarea>
                            <button id="process-paste-btn" class="btn-primary">
                                🔍 解析账单
                            </button>
                        </div>

                        <div class="import-method">
                            <h3 class="method-title">上传文件</h3>
                            <div class="file-upload">
                                <input type="file" id="email-input" accept=".txt,.eml,.html,.md">
                                <label for="email-input" class="file-label">
                                    <span class="upload-icon">📁</span>
                                    <span class="upload-text">选择文件或拖拽到此处</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 预览区域 -->
                    <div id="preview-area" class="preview-area hidden">
                        <h3 class="preview-title">解析预览</h3>
                        <div id="preview-content" class="preview-content"></div>
                        <div class="preview-actions">
                            <button id="confirm-import-btn" class="btn-primary">
                                ✅ 确认导入
                            </button>
                            <button id="cancel-import-btn" class="btn-secondary">
                                ❌ 取消
                            </button>
                        </div>
                    </div>

                    <!-- 使用说明 -->
                    <div class="help-section">
                        <h3 class="help-title">📖 使用说明</h3>
                        <div class="help-content">
                            <p><strong>支持的格式：</strong></p>
                            <ul>
                                <li>邮件文本（直接粘贴邮件内容）</li>
                                <li>.txt 文件</li>
                                <li>.eml 邮件文件</li>
                                <li>.html 文件</li>
                            </ul>
                            <p><strong>示例格式：</strong></p>
                            <pre>2024-01-15  美团外卖  ¥32.50
2024-01-14  滴滴出行  ¥28.00
2024-01-13  淘宝购物  ¥199.00</pre>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 通知容器 -->
    <div id="notification-container"></div>

    <!-- 移动端遮罩 -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- 脚本加载 -->
    <script src="js/utils.js"></script>
    <script src="js/models/Transaction.js"></script>
    <script src="js/models/Category.js"></script>
    <script src="js/models/MonthlyBill.js"></script>
    <script src="js/parsers/EmailParser.js"></script>
    <script src="js/classifiers/RuleEngine.js"></script>
    <script src="js/classifiers/AutoClassifier.js"></script>
    <script src="js/storage/StorageManager.js"></script>
    <script src="js/analytics/TrendAnalyzer.js"></script>
    <script src="js/analytics/Statistics.js"></script>
    <script src="js/views/DashboardView.js"></script>
    <script src="js/views/TransactionListView.js"></script>
    <script src="js/views/ChartView.js"></script>
    <script src="js/controllers/AppController.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
