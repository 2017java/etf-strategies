name: secret-scan

on:
  push:
    branches: [main, 'feat-*', 'fix-*']
  pull_request:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉全部历史，扫描所有 commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan against baseline
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'node_modules|\.venv|backend/data|\.parquet$|package-lock\.json'

      - name: Audit baseline (fail if new secrets)
        run: |
          detect-secrets audit --report --fail-on-unaudited .secrets.baseline || \
          (echo "::error::发现新的疑似敏感信息！请运行 'detect-secrets scan --baseline .secrets.baseline' 更新基线" && exit 1)
